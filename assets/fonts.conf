<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!-- 
    这是一个 Fontconfig 配置文件，用于指定字体目录和缓存目录。
    你可以根据需要修改字体目录路径和缓存目录路径。
    Linux用户一般不需要此文件，Windows用户可以使用此文件来指定字体目录。
-->
<fontconfig>
    <!-- Windows 字体目录 -->
    <dir>C:/Windows/Fonts</dir>

    <!-- 用户字体目录 -->
    <dir>~/.fonts</dir>

    <!-- 缓存目录（可选，用于避免权限问题） -->
    <cachedir>./assets/fontconfig_cache</cachedir>

    <!-- 配置无衬线字体 (sans-serif) 的优先级 -->
    <alias>
        <family>sans-serif</family>
        <prefer>
            <family>Microsoft YaHei</family>   <!-- 你最想用的字体 -->
            <family>Segoe UI Emoji</family>    <!-- Windows Emoji 字体 -->
            <family>Noto Sans CJK SC</family>  <!-- 备选字体1 -->
            <family>Arial</family>             <!-- 备选字体2 -->
        </prefer>
    </alias>

    <!-- 配置等宽字体 (monospace) 的优先级，对终端和编辑器很重要 -->
    <alias>
        <family>monospace</family>
        <prefer>
            <family>Consolas</family>
            <family>Source Han Mono SC</family>
            <family>DejaVu Sans Mono</family>
        </prefer>
    </alias>

    <match>
        <!-- 指定一个英文字体，例如你终端里用的字体 -->
        <test name="family" compare="eq">
            <string>monospace</string>
        </test>
        <!-- 告诉fontconfig，当上面的字体找不到字符时，优先使用这个中文字体 -->
        <edit name="family" mode="append">
            <string>SimSun</string>
        </edit>
    </match>

    <!-- 配置衬线字体 (serif) 的优先级 -->
    <alias>
        <family>serif</family>
        <prefer>
            <family>SimSun</family>
            <family>Noto Serif CJK SC</family>
            <family>Times New Roman</family>
        </prefer>
    </alias>

    <!-- 包含其他配置 -->
    <include ignore_missing="yes">conf.d</include>
</fontconfig>