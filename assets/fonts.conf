<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!-- 
    这是一个 Fontconfig 配置文件，用于指定字体目录和缓存目录。
    你可以根据需要修改字体目录路径和缓存目录路径。
-->
<fontconfig>
    <!-- 字体目录 -->
    <dir prefix="cwd">./assets/fonts</dir>

    <!-- 字体缓存目录 -->
    <cachedir>./assets/fontconfig_cache</cachedir>

    <!-- ======================================== -->
    <!-- 1. 无衬线字体 (sans-serif)：思源黑体     -->
    <!-- ======================================== -->
    <alias>
        <family>sans-serif</family>
        <prefer>
            <family>Noto Sans CJK SC</family>
        </prefer>
    </alias>

    <!-- 反向别名：让具体字体也属于 sans-serif 族 -->
    <alias>
        <family>Noto Sans CJK SC</family>
        <default>
            <family>sans-serif</family>
        </default>
    </alias>


    <!-- ======================================== -->
    <!-- 2. 衬线字体 (serif)：思源宋体           -->
    <!-- ======================================== -->
    <alias>
        <family>serif</family>
        <prefer>
            <family>Noto Serif CJK SC</family>
        </prefer>
    </alias>

    <alias>
        <family>Noto Serif CJK SC</family>
        <default>
            <family>serif</family>
        </default>
    </alias>


    <!-- ======================================== -->
    <!-- 3. 等宽字体 (monospace)：更纱黑体       -->
    <!-- ======================================== -->
    <alias>
        <family>monospace</family>
        <prefer>
            <family>Sarasa Fixed SC</family>
        </prefer>
    </alias>

    <alias>
        <family>Sarasa Fixed SC</family>
        <default>
            <family>monospace</family>
        </default>
    </alias>


    <!-- ======================================== -->
    <!-- 4. Emoji 字体配置                        -->
    <!-- ======================================== -->
    <alias>
        <family>sans-serif</family>
        <prefer>
            <family>OpenMoji Color</family>
        </prefer>
    </alias>

    <alias>
        <family>OpenMoji Color</family>
        <default>
            <family>sans-serif</family>
        </default>
    </alias>

    <!-- 包含其他配置 -->
    <include ignore_missing="yes">conf.d</include>
</fontconfig>