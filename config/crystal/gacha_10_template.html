<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gacha 10 Cards</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 1728px;
        min-height: 434px;
        background: #f4f0f7;
        font-family: "Noto Sans SC", "Microsoft YaHei", sans-serif;
      }

      .canvas {
        width: 1728px;
        padding: 28px;
        background: #f4f0f7;
      }

      .image-grid {
        display: grid;
        grid-template-columns: repeat(5, 320px);
        grid-template-rows: repeat(2, 180px);
        gap: 18px;
      }

      .image-slot {
        width: 320px;
        height: 180px;
        overflow: hidden;
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 8px 20px rgba(50, 38, 66, 0.16);
      }

      .image-slot img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
    </style>
  </head>
  <body>
    <main class="canvas">
      <div class="image-grid">
        {% for image in images[:10] %}
        <div class="image-slot">
          <img
            src="{{ image.src | default(image, true) }}"
            alt="{{ image.alt | default('image ' ~ loop.index, true) }}"
          />
        </div>
        {% endfor %}
      </div>
    </main>
  </body>
</html>
